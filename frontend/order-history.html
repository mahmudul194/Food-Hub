<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Hub - Order History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        .orders-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .order-card { background: white; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; }
        .status-badge { padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .status-pending { background: #FFF3CD; color: #856404; }
        .status-preparing { background: #CCE5FF; color: #004085; }
        .status-out_for_delivery { background: #D4EDDA; color: #155724; }
        .status-delivered { background: #E2E3E5; color: #383D41; }
        .o-item { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 8px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo"><div class="logo-icon"><i class="ri-restaurant-2-fill"></i></div>Food Hub</a>
        <div class="search-bar"><i class="ri-search-line"></i><input type="text" placeholder="Search orders..." class="search-input"></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="browse.html">Restaurants</a></li>
            <li><a href="order-history.html" class="text-primary" style="font-weight:600;">My Orders</a></li>
        </ul>
        <div class="nav-actions">
            <div class="icon-btn" onclick="window.location.href='checkout.html'"><i class="ri-shopping-cart-2-fill"></i></div>
            <div class="icon-btn" onclick="window.location.href='dashboard.html'"><i class="ri-user-line"></i></div>
        </div>
    </nav>

    <div class="orders-container">
        <h2 style="margin-bottom: 30px;">Track Your Orders</h2>
        <div id="orders-list">
            <p>Loading your orders...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/order-history.js"></script>
